id: self_modify
info:
  name: Process Self-Modification
  author: sl4y3r
  severity: high
  description: >
    The same PID opened its own executable path for writing (O_WRONLY, O_RDWR,
    or O_CREAT). Uses file_open flags, not generic file_rw, so plain reads of
    the binary are not alerted. Requires that this PID previously exec’d that
    path in the session (same-path, same-process tampering).
  tags: [ai, persistence, tamper, high-risk]
  risk-score: 80

matchers:
  - type: event-type
    values: [file_open]

  - type: file
    field: is_write_open
    equals: true

  - type: session
    field: exec_binary_match_filepath_same_pid
    equals: true

matchers-condition: and
