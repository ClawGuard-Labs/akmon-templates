id: read_write_loop
info:
  name: Read-Write Inference Loop
  author: sl4y3r
  severity: low
  description: >
    A session contains file_rw events on at least two different file paths.
    This matches the pattern of an AI inference pipeline reading an input
    file and writing to an output file — useful for auditing data flows.
  tags: [ai, filesystem, inference, data-flow]
  risk-score: 15

matchers:
  - type: event-type
    values: [file_rw]

  # Session must have another file_rw with a different path than the current event.
  - type: session
    field: other_file_rw
    equals: true

  # Only fire within a confirmed AI session to avoid noise from general-purpose
  # daemons (VS Code, gateways, oom-killer) that also read/write multiple files.
  - type: process
    field: is_ai_process
    equals: true
  - type: session
    field: has_ai_process
    equals: true

  # Drop paths that almost never represent “inference I/O” but dominate volume:
  - type: filepath
    regex: (?i)(/tmp/|/var/tmp/|/dev/shm/|/proc/|/sys/|/dev/|/run/user/|\.cache/|__pycache__|/site-packages/|/dist-packages/|/pip/|/pip-tools/|pip/_cache|node_modules/|/\.git/|\.venv/|/venv/|/\.local/share/|/\.npm/|/\.pnpm-store/|/\.gradle/|/\.m2/|jupyter/runtime|ipython/profile|/\.cargo/registry|/\.rustup/|/\.nuget/)
    negate: true

matchers-condition: and
