id: outbound_http
info:
  name: Outbound HTTP/HTTPS Connection
  author: sl4y3r
  severity: info
  description: >
    A process opened an outbound connection to port 80 (HTTP) or 443 (HTTPS).
    Expected for AI agents calling external APIs, but tracked for audit purposes.
  tags: [ai, network, http, egress]
  risk-score: 10

matchers:
  - type: event-type
    values: [net_connect]

  - type: network
    field: dst_port
    values: ["80", "443"]

  - type: process
    field: is_ai_process
    equals: true

  # For now, we'll skip loopback, RFC1918, CGNAT and link-local (fe80::/10).
  # Adjust if your LLM/API only exists on-LAN.
  - type: network
    field: dst_ip
    regex: '(?i)^(127\.|::1$|0:0:0:0:0:0:0:1$|^10\.|^192\.168\.|^172\.(1[6-9]|2[0-9]|3[0-1])\.|^169\.254\.|^100\.(6[4-9]|[7-9][0-9]|1[0-1][0-9]|12[0-7])\.)|^fe80:'
    negate: true

matchers-condition: and
